name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    if: >
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR for:
            - Type safety issues (heavily-typed TypeScript library using mapped types and generics)
            - Correct finite state machine semantics (transitions, lifecycle hooks, veto capability)
            - Plugin API contract violations
            - Missing or incorrect test coverage
            - Consistency with the existing functional/modular architecture in lib/core/

            Be concise. Focus on substantive issues, not style (oxlint and oxfmt handle that).
