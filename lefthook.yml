#   https://lefthook.dev/configuration/

pre-push:
  parallel: true
  jobs:
    - name: types
      run: pnpm check:types

    - name: lint
      run: pnpm lint

    - name: format
      run: pnpm fmt:check

    - name: test
      run: pnpm test

pre-commit:
  parallel: true
  jobs:
    - name: types
      run: pnpm check:types

    - name: lint
      run: pnpm lint

    - name: format
      run: pnpm fmt:check

    - name: test
      run: pnpm test
